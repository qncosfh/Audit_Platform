services:
  postgres:
    #image: postgres:15-alpine
    image: mirror.ccs.tencentyun.com/library/postgres:15-alpine
    container_name: platform-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
      #- postgres-data:/var/lib/postgresql/data
    networks:
      - platform-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: platform-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/sandbox:/app/sandbox
    networks:
      - platform-network

  frontend:
    image: mirror.ccs.tencentyun.com/library/nginx:alpine
    container_name: platform-frontend
    restart: unless-stopped
    ports:
      - "4416:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - platform-network

networks:
  platform-network:
    driver: bridge

